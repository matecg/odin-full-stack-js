<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Signup</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="left-section">
    <div class="hero">
      <img src="./assets/imgs/odin-lined.png" alt="Logo showing the lined drawing of Odin's face">
      <h1><span>O</span>DIN</h1>
    </div>
  </div>
  <div class="right-section">
    <div class="info">
      <p><span>This is not a real online service!</span> You know you need something like this in your life to help you
        realize your deepest dreams.
      <p>Sign up <em>now</em> to get started.</p></p>
      <p>You <em>know</em> you want to.</p>
    </div>
    <div>
      <form action="" method="get">
        <div class="form-content">
          <h2>Let's do this!</h2>
          <div>
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" placeholder="John">
          </div>
          <div>
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" placeholder="Doe">
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="johndoe@example.com">
          </div>
          <div>
            <label for="phone">Phone Number</label>
            <input type="tel" name="phone" id="phone">
          </div>
          <div>
            <label for="pass">Password</label>
            <input type="password" name="pass" id="pass">
          </div>
          <div>
            <label for="confirm-pass">Confirm Password</label>
            <input type="password" name="confirm-pass" id="confirm-pass">
          </div>
        </div>
        <div>
          <button type="submit">Create Account</button>
          <p>Already have an account? <a href="#">Log in</a></p>
        </div>

      </form>
    </div>
  </div>
</body>

</html>
