<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Form</title>
  <style>
    :root {
      --primary-clr: steelblue;
      --secondary-clr: rgb(114, 179, 233);
      --dark-clr: rgb(29, 84, 129);
    }

    h1, h2 {
      color: var(--primary-clr);
    }

    body {
      text-align: center;
    }

    form {
      display: inline-block;
      padding: 1em;
      border: 2px solid var(--primary-clr);
      border-radius: 1em;
    }

    p+p {
      margin-top: 1em;
    }

    label {
      display: inline-block;
      min-width: 90px;
      text-align: right;
      color: var(--dark-clr);
      font-weight: 600;
    }

    input,
    textarea {
      font: 1em sans-serif;
      width: 300px;
      box-sizing: border-box;
      border: 1px solid var(--primary-clr);
      border-radius: 0.5em;
      padding: 0.5em;
    }

    input:focus,
    textarea:focus,
    fieldset:focus {
      outline-style: solid;
      outline-color: black;
    }

    textarea {
      vertical-align: top;
      height: 5em;
    }

    button {
      padding: 0.75em 1.5em;
      border-radius: 0.5em;
      border: none;
      background-color: var(--secondary-clr);
    }

    button:hover {
      cursor: pointer;
      background-color: var(--primary-clr);
      box-shadow: 0 2px 5px var(--primary-clr);
    }

    ul {
      margin: 0;
      padding: 0;
    }

    fieldset {
      border: 1px solid var(--primary-clr);
      border-radius: 1em;
      text-align: start;
    }

    li {
      list-style: none;
      padding: 0.25em;
    }

    li input {
      max-width: 25px;
    }

    section + section {
      margin-top: 50px;
    }

    strong {
      color: crimson;
      font-weight: 700;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-size: 1.1rem;
    }

    .info-para {
      color: gray;
      font-weight: 400;
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>

<body>
  <form action="">
    <h1>Payment Form</h1>
    <p><strong class="info-para">Please complete all required (<strong>*</strong>) fields.</strong></p>
    <section>
      <h2>Contact Information</h2>
      <fieldset>
        <legend>Choose your plan:</legend>
        <ul>
          <li>
            <label for="title_1">
              <input type="radio" name="title" id="title_1" value="standard">
              Standard
            </label>
          </li>
          <li>
            <label for="title_2">
              <input type="radio" name="title" id="title_2" value="premium" checked>
              Premium
            </label>
          </li>
          <li>
            <label for="title_3">
              <input type="radio" name="title" id="title_3" value="enterprise">
              Enterprise
            </label>
          </li>
        </ul>
      </fieldset>
      <p>
        <label for="name">Name <strong aria-label="required">*</strong>:</label>
        <input type="text" id="name" required aria-required="true">
      </p>
      <p>
        <label for="mail">Email <strong aria-label="required">*</strong>:</label>
        <input type="email" id="mail" required aria-required="true">
      </p>
      <p>
        <label for="pwd">Password <strong aria-label="required">*</strong>:</label>
        <input type="password" id="pwd" required aria-required="true">
      </p>
    </section>
    <section>
      <h2>Payment Information</h2>
      <p>
        <label for="card">
          <span>Card type:</span>
        </label>
        <select name="user-card" id="card">
          <option value="visa">Visa</option>
          <option value="mc">Mastercard</option>
          <option value="amex">American Express</option>
        </select>
      </p>
      <p>
        <label for="number">Card number <strong aria-label="required">*</strong>:</label>
        <input type="tel" name="card-number" id="number" required aria-required="true"
          placeholder="1234 4567 7890 0123">
      </p>
      <p>
        <label for="expiration">Expiration date <strong aria-label="required">*</strong>:</label>
        <input type="text" id="expiration" name="expiration" placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])/([0-9]{2})1"
          required aria-required="true">
      </p>
    </section>
    <section>
      <p>
        <button type="submit">Confirm payment</button>
      </p>
    </section>
  </form>
  <div><a href="./index.html">Back</a></div>
</body>

</html>
