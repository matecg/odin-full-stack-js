<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postcard</title>
  <style>
    @font-face {
      font-family: "handwriting";
      src: 
        url("fonts/journal-webfont.woff2") format("woff2"),
        url("fonts/journal-webfont.woff") format("woff");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "typewriter";
      src: 
        url("fonts/momt___-webfont.woff2") format("woff2"),
        url("fonts/momt___-webfont.woff") format("woff");
      font-weight: normal;
      font-style: normal;
    }

    h1 {
      color:white;
      font-family: "typewriter", cursive, sans-serif;
      letter-spacing: 0.25rem;
      text-decoration: underline;
    }

    a {
      color: aqua;
    }

    body {
      font: 1.3rem sans-serif;
      padding: 0.5em;
      margin: 0;
      background: #222;
    }

    form {
      position: relative;
      /* Background image width and height */
      width: 740px;
      height: 498px;
      margin: 0 auto;
      padding: 1em;
      box-sizing: border-box;
      background: white url("background.jpg");
      display:grid;
      grid-gap: 20px;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: 10em 1em 1em 1em;
    }

    h2 {
      font:
        1em "typewriter", monospace;
      align-self: end;
    }

    #message {
      grid-row: 1 / 5;
    }

    #from,
    #reply {
      display: flex;
    }

    label {
      font: 0.8em "typewriter", sans-serif;
    }

    input,
    textarea {
      font:
        1.4em/1.5em "handwriting", cursive, sans-serif;
      border:none;
      padding: 0 10px;
      margin: 0;
      width: 80%;
      background: none;
    }

    input:focus,
    textarea:focus {
      background: rgb(0 0 0 / 10%);
      border-radius: 5px;
    }

    textarea {
      display: block;
      padding: 10px;
      margin: 10px 0 0 -10px;
      width: 100%;
      height: 90%;
      border-right: 2px solid;
      overflow: auto;
    }

    button {
      padding: 5px;
      font: bold 0.6em sans-serif;
      border: 2px solid #333;
      border-radius: 5px;
      background: none;
      cursor: pointer;
      transform: rotate(-1.5deg);
    }

    button::after {
      content: " >>>";
    }

    button:hover,
    button:focus {
      background: #333;
      color: white;
    }

  </style>
</head>

<body>
  <h1>Postcard Form</h1>
  <form>
    <h2>to: Mozilla</h2>

    <div id="from">
      <label for="name">from:</label>
      <input type="text" id="name" name="user_name">
    </div>

    <div id="reply">
      <label for="mail">reply:</label>
      <input type="text" id="mail" name="user_email">
    </div>

    <div id="message">
      <label for="msg">Your message:</label>
      <textarea name="user_message" id="msg"></textarea>
    </div>

    <div class="button">
      <button type="submit">Send your message</button>
    </div>
  </form>
  <div><a href="./index.html">Back</a></div>
</body>

</html>
