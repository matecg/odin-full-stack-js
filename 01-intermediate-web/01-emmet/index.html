<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- Shortcut to Emmet Wrap: CTRL+ALT+W -->
  <!-- Command to generate: nav>ul>li* -->
  <nav>
    <ul>
      <li>* Unordered item 1</li>
      <li>* Unordered item 2</li>
      <li>* Unordered item 3</li>
    </ul>
  </nav>

  <!-- Command to generate: ol>li.item* -->
  <ol>
    <li class="item">Chocolate</li>
    <li class="item">Wine</li>
    <li class="item">Meat</li>
  </ol>

  <!-- Shortcut to Emmet Remove Tag: CTRL+ALT+D -->
  <div>
    <div class="remove-me!">
    </div>
  </div>
</body>

</html>
