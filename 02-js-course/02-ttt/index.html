<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div>
    <button class="next-btn">Next</button>
  </div>
  <div class="board">
    <button class="empty top left" data-tile="0"></button>
    <button class="empty top" data-tile="1"></button>
    <button class="empty top right" data-tile="2"></button>
    <button class="empty left" data-tile="3"></button>
    <button class="empty" data-tile="4"></button>
    <button class="empty right" data-tile="5"></button>
    <button class="empty left bottom" data-tile="6"></button>
    <button class="empty bottom" data-tile="7"></button>
    <button class="empty bottom right" data-tile="8"></button>
  </div>
  <script src="code.js"></script>
</body>
</html>
