<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div>
    <div class="game-setup">
      <div>
        <label for="p1">Player 1: </label>
        <input type="text" name="p1" id="p1">
      </div>
      <div>
        <label for="p2">Player 2:</label>
        <input type="text" name="p2" id="p2">
        <label for="is-computer">Computer?</label>
        <input type="checkbox" name="is-computer" id="is-computer">
      </div>
      <button>Start</button>
    </div>
    <div class="game-info">
      <div>
        <p><span>Player 1: </span>Jordan</p>
      </div>
      <div>
        <button class="next-btn">Next</button>
        <p><span>Player 2: </span>Susy</p>
      </div>
    </div>
  </div>
  <div class="board">
    <button class="empty" data-tile="0"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="1"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="2"></button>
    <div class="row board-line"></div>
    <button class="empty" data-tile="3"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="4"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="5"></button>
    <div class="row board-line"></div>
    <button class="empty" data-tile="6"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="7"></button>
    <div class="board-line"></div>
    <button class="empty" data-tile="8"></button>
  </div>
  <script src="code.js"></script>
</body>
</html>
